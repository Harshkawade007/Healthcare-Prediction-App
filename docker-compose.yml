services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: healthcare-backend:cpu
    container_name: healthcare-backend
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: healthcare-frontend:latest
    container_name: healthcare-frontend
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      - backend
