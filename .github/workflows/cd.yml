name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-main
  cancel-in-progress: true

jobs:
  build-push-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          tags: |
            harshkawade007/healthcare-backend:latest
            harshkawade007/healthcare-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: |
            harshkawade007/healthcare-frontend:latest
            harshkawade007/healthcare-frontend:${{ github.sha }}

      - name: Trigger Render deploy hooks
        env:
          RENDER_BACKEND_DEPLOY_HOOK_URL: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}
          RENDER_FRONTEND_DEPLOY_HOOK_URL: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL }}
        run: |
          trigger_hook() {
            local name="$1"
            local url="$2"
            if [ -z "$url" ]; then
              echo "$name deploy hook missing: skipped."
              return 0
            fi
            code=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$url" || true)
            if [ "$code" = "405" ]; then
              echo "$name hook returned 405 on POST, retrying with GET..."
              code=$(curl -s -o /dev/null -w "%{http_code}" -X GET "$url" || true)
            fi
            if [ "$code" = "200" ] || [ "$code" = "201" ] || [ "$code" = "202" ]; then
              echo "$name deploy hook triggered successfully (HTTP $code)."
            else
              echo "WARNING: $name deploy hook returned HTTP $code. Check deploy hook URL in GitHub secrets."
            fi
          }

          trigger_hook "Backend" "${RENDER_BACKEND_DEPLOY_HOOK_URL}"
          trigger_hook "Frontend" "${RENDER_FRONTEND_DEPLOY_HOOK_URL}"
        shell: bash

      - name: Deployment hook summary
        env:
          RENDER_BACKEND_DEPLOY_HOOK_URL: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}
          RENDER_FRONTEND_DEPLOY_HOOK_URL: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "${RENDER_BACKEND_DEPLOY_HOOK_URL}" ]; then
            echo "Backend deploy hook status: missing"
          else
            echo "Backend deploy hook status: configured"
          fi
          if [ -z "${RENDER_FRONTEND_DEPLOY_HOOK_URL}" ]; then
            echo "Frontend deploy hook status: missing"
          else
            echo "Frontend deploy hook status: configured"
          fi
        shell: bash
