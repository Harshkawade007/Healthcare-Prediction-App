name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-main
  cancel-in-progress: true

jobs:
  build-push-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          tags: |
            harshkawade007/healthcare-backend:latest
            harshkawade007/healthcare-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: |
            harshkawade007/healthcare-frontend:latest
            harshkawade007/healthcare-frontend:${{ github.sha }}

      - name: Trigger Render deploy hooks
        env:
          RENDER_BACKEND_DEPLOY_HOOK_URL: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}
          RENDER_FRONTEND_DEPLOY_HOOK_URL: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "${RENDER_BACKEND_DEPLOY_HOOK_URL}" ]; then
            echo "Backend deploy hook missing: skipped backend redeploy trigger."
          else
            curl -fsS -X POST "${RENDER_BACKEND_DEPLOY_HOOK_URL}"
            echo "Backend deploy hook triggered."
          fi
          if [ -z "${RENDER_FRONTEND_DEPLOY_HOOK_URL}" ]; then
            echo "Frontend deploy hook missing: skipped frontend redeploy trigger."
          else
            curl -fsS -X POST "${RENDER_FRONTEND_DEPLOY_HOOK_URL}"
            echo "Frontend deploy hook triggered."
          fi
