name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  basic-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Syntax compile check
        run: python -m compileall app main.py lung_disease_model.py

      - name: Validate Docker compose file
        run: docker compose config
